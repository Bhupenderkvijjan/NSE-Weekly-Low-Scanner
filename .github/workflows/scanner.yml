name: NSE Weekly Low Scanner

on:
  workflow_dispatch:       # Manual "Run workflow" button on GitHub
  schedule:
    - cron: '30 3 * * 1-5' # Runs Mon–Fri at 9:00 AM IST (3:30 UTC)

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas yfinance openpyxl

      - name: Run scanner
        run: python scanner.py

      - name: Commit and push output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "Scanner update $(date +'%Y-%m-%d %H:%M IST')"
          git push
